<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault | The Monolith</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --surface: #fbfcff;
            --on-surface: #191c1e;
            --surface-container-lowest: #ffffff;
            --surface-container-low: #f0f4f8;
            --surface-container: #eef1f6;
            --surface-container-high: #e2e7ee;
            --primary: #006492;
            --primary-container: #c9e6ff;
            --on-primary-container: #001e2f;
            --tertiary: #004b5d;
            --outline-variant: #c2c7cf;
        }

        [x-cloak] { display: none !important; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            transition: background-color 0.3s ease;
        }

        .editorial-heading {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.04em;
        }

        .vault-surface {
            background-color: var(--surface-container-low);
            border-radius: 2rem;
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1), background-color 0.2s ease;
        }

        .vault-surface:hover {
            background-color: var(--surface-container);
            transform: translateY(-4px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #007bb3);
            color: white;
            border-radius: 9999px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            box-shadow: 0 4px 14px 0 rgba(0, 100, 146, 0.3);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px 0 rgba(0, 100, 146, 0.4);
            transform: scale(1.02);
        }

        .btn-ghost {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary-container);
            border-radius: 9999px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .input-editorial {
            background-color: var(--surface-container-lowest);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            width: 100%;
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        .input-editorial:focus {
            box-shadow: 0 0 0 3px var(--primary-container);
        }

        .credential-row {
            background-color: transparent;
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin-bottom: 0.5rem;
            transition: background-color 0.2s ease;
        }

        .credential-row:hover {
            background-color: var(--surface-container-high);
        }

        .monolith-card {
            background-color: var(--surface-container-lowest);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
        }

        .asymmetric-margin {
            margin-left: clamp(1rem, 10vw, 8rem);
        }
    </style>
</head>
<body x-data="vaultApp()" x-init="init()">

    <!-- 1. VAULT SELECTION (THE GALLERY) -->
    <template x-if="screen === 'selection'">
        <div class="min-h-screen p-8 md:p-20 flex flex-col justify-center">
            <div class="max-w-7xl mx-auto w-full">
                <header class="mb-20">
                    <p class="text-xs font-bold uppercase tracking-[0.4em] text-slate-400 mb-6">The Crystalline Vault</p>
                    <h1 class="editorial-heading mb-8">Heavy.<br>Secure.<br>Personal.</h1>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <template x-for="(v, id) in registry" :key="id">
                        <button @click="selectVault(id)" class="vault-surface p-10 text-left group">
                            <div class="flex justify-between items-start mb-12">
                                <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm">
                                    <i data-lucide="shield-check" class="w-6 h-6 text-primary"></i>
                                </div>
                                <span class="text-[10px] font-bold tracking-widest text-slate-400" x-text="new Date(v.created).getFullYear()"></span>
                            </div>
                            <h3 class="text-3xl font-bold mb-2 group-hover:text-primary transition-colors" x-text="v.name"></h3>
                            <p class="text-slate-500 font-medium" x-text="(v.itemCount || 0) + ' items stored'"></p>
                        </button>
                    </template>

                    <button @click="screen = 'create'" class="p-10 border-4 border-dashed border-slate-200 rounded-[2rem] hover:border-primary/30 transition-all flex flex-col items-center justify-center gap-4 group">
                        <div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center group-hover:bg-primary-container transition-colors">
                            <i data-lucide="plus" class="w-8 h-8 text-slate-400 group-hover:text-primary"></i>
                        </div>
                        <span class="font-bold text-slate-400 group-hover:text-primary">New Monolith</span>
                    </button>
                </div>

                <div class="mt-20 flex items-center gap-12 opacity-50 grayscale hover:grayscale-0 transition-all">
                    <button @click="triggerImport()" class="text-xs font-bold uppercase tracking-widest flex items-center gap-3">
                        <i data-lucide="file-up" class="w-4 h-4"></i> Link External Vault
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- 2. VAULT CREATION -->
    <template x-if="screen === 'create'">
        <div class="min-h-screen flex items-center p-8 md:p-20">
            <div class="max-w-xl w-full">
                <button @click="screen = 'selection'" class="mb-12 text-slate-400 hover:text-primary flex items-center gap-2 font-bold uppercase text-[10px] tracking-widest">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Return to Gallery
                </button>
                <h2 class="editorial-heading mb-12">Forge<br>New Vault.</h2>
                <div class="space-y-6">
                    <input type="text" x-model="setup.name" placeholder="Identifier" class="input-editorial text-xl">
                    <input type="password" x-model="setup.key1" placeholder="Master Phrase" class="input-editorial text-xl">
                    <input type="password" x-model="setup.key2" placeholder="Confirm Phrase" class="input-editorial text-xl">
                    <div class="pt-6">
                        <button @click="createNewVault()" class="btn-primary w-full text-lg py-5">Initialize Monolith</button>
                    </div>
                    <p x-show="error" x-text="error" class="text-rose-500 font-bold text-center" x-cloak></p>
                </div>
            </div>
        </div>
    </template>

    <!-- 3. UNLOCK -->
    <template x-if="screen === 'unlock'">
        <div class="min-h-screen flex items-center justify-center p-8">
            <div class="max-w-md w-full text-center">
                <div class="mb-12 inline-block p-8 rounded-full bg-primary/5">
                    <i data-lucide="lock" class="w-12 h-12 text-primary"></i>
                </div>
                <h2 class="text-4xl font-extrabold mb-4" x-text="activeVaultId ? registry[activeVaultId]?.name : ''"></h2>
                <p class="text-slate-500 mb-12">Verify your authority to access this vault.</p>
                <div class="space-y-4">
                    <input type="password" x-model="masterKey" @keydown.enter="unlockActiveVault()" placeholder="Master Key" class="input-editorial text-center text-2xl tracking-tight">
                    <div class="flex flex-col gap-4 pt-4">
                        <button @click="unlockActiveVault()" class="btn-primary text-lg">Decrypt</button>
                        <button @click="screen = 'selection'; masterKey = ''" class="btn-ghost border-none text-slate-400">Cancel</button>
                    </div>
                    <p x-show="error" x-text="error" class="text-rose-500 font-bold" x-cloak></p>
                </div>
            </div>
        </div>
    </template>

    <!-- 4. CORE APP -->
    <div x-show="screen === 'app'" class="min-h-screen p-8 md:p-20" x-cloak>
        <div class="max-w-7xl mx-auto">
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-12 mb-24">
                <div>
                    <button @click="lockVault()" class="mb-8 text-slate-400 hover:text-primary flex items-center gap-2 font-bold uppercase text-[10px] tracking-widest">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i> Exit Vault
                    </button>
                    <h1 class="editorial-heading" x-text="activeVaultId ? registry[activeVaultId]?.name : ''"></h1>
                </div>
                <div class="flex gap-4">
                    <button @click="exportVault()" class="btn-ghost"><i data-lucide="download" class="w-4 h-4 inline mr-2"></i> Hard Copy</button>
                    <button @click="lockVault()" class="btn-primary" style="background: var(--tertiary)">Seal Vault</button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <!-- Entry Side -->
                <div class="lg:col-span-4">
                    <div class="monolith-card p-10 sticky top-20">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-8">Deposit Credential</h3>
                        <div class="space-y-4">
                            <input x-model="newEntry.site" type="text" placeholder="Platform" class="input-editorial">
                            <input x-model="newEntry.user" type="text" placeholder="Identity" class="input-editorial">
                            <div class="relative">
                                <input x-model="newEntry.pass" type="text" placeholder="Secret" class="input-editorial">
                                <button @click="generatePass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
                                    <i data-lucide="dices" class="w-5 h-5"></i>
                                </button>
                            </div>
                            <button @click="addEntry()" class="btn-primary w-full mt-4">Store Securely</button>
                        </div>
                    </div>
                </div>

                <!-- List Side -->
                <div class="lg:col-span-8">
                    <div class="mb-12 relative max-w-xl">
                        <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                        <input x-model="searchQuery" type="text" placeholder="Query monolith..." class="w-full bg-transparent text-2xl font-semibold border-b-2 border-slate-100 py-6 pl-16 focus:border-primary outline-none transition-all">
                    </div>

                    <div class="space-y-2">
                        <template x-for="(entry, index) in filteredVault" :key="index">
                            <div class="credential-row group flex items-center justify-between">
                                <div class="flex items-center gap-8">
                                    <div class="w-14 h-14 rounded-2xl bg-surface-container flex items-center justify-center text-primary">
                                        <i data-lucide="shield" class="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <p class="text-2xl font-bold tracking-tight" x-text="entry.site"></p>
                                        <p class="text-sm font-medium text-slate-400" x-text="entry.user"></p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-6">
                                    <!-- Interactive Password Display -->
                                    <div x-show="entry.visible" 
                                         @click="copyToClipboard(entry.pass)"
                                         class="bg-primary/5 px-6 py-3 rounded-full font-mono text-primary font-bold cursor-pointer hover:bg-primary/10 transition-colors group/pass relative"
                                         title="Click to copy">
                                        <span x-text="entry.pass"></span>
                                        <i data-lucide="copy" class="w-3 h-3 ml-2 inline opacity-40 group-hover/pass:opacity-100 transition-opacity"></i>
                                    </div>
                                    <div class="flex opacity-0 group-hover:opacity-100 transition-opacity gap-2">
                                        <button @click="entry.visible = !entry.visible" class="p-3 hover:bg-white rounded-full transition-colors text-slate-400 hover:text-primary">
                                            <i :data-lucide="entry.visible ? 'eye-off' : 'eye'" class="w-5 h-5"></i>
                                        </button>
                                        <button @click="deleteEntry(index)" class="p-3 hover:bg-rose-50 rounded-full transition-colors text-slate-400 hover:text-rose-500">
                                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- UI ELEMENTS -->
    <input type="file" id="importFile" @change="handleImport($event)" class="hidden" accept=".json">
    <div x-show="toast.show" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
         class="fixed bottom-12 right-12 bg-on-surface text-white px-8 py-4 rounded-full shadow-2xl z-[100] flex items-center gap-4 font-bold">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-primary-container"></i>
        <span x-text="toast.message"></span>
    </div>

    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        function vaultApp() {
            return {
                screen: 'selection',
                registry: {},
                activeVaultId: null,
                masterKey: '',
                error: '',
                searchQuery: '',
                toast: { show: false, message: '' },
                newEntry: { site: '', user: '', pass: '' },
                setup: { name: '', key1: '', key2: '' },
                vault: [],

                get filteredVault() {
                    if (!this.searchQuery) return this.vault;
                    return this.vault.filter(e => e.site.toLowerCase().includes(this.searchQuery.toLowerCase()));
                },

                init() {
                    const saved = localStorage.getItem('vault_registry');
                    if (saved) {
                        try { this.registry = JSON.parse(saved); } catch(e) { this.registry = {}; }
                    }
                    this.$nextTick(() => lucide.createIcons());
                },

                async createNewVault() {
                    if (!this.setup.name || !this.setup.key1) return;
                    if (this.setup.key1 !== this.setup.key2) {
                        this.error = "Phrases do not match";
                        return;
                    }
                    const id = 'v_' + Date.now();
                    this.registry[id] = { name: this.setup.name, created: new Date().toISOString(), itemCount: 0 };
                    this.activeVaultId = id;
                    this.masterKey = this.setup.key1;
                    this.vault = [];
                    await this.saveVaultData();
                    this.saveRegistry();
                    this.screen = 'app';
                    this.setup = { name: '', key1: '', key2: '' };
                    this.showToast("Monolith Initialized");
                    this.$nextTick(() => lucide.createIcons());
                },

                selectVault(id) {
                    this.activeVaultId = id;
                    this.screen = 'unlock';
                    this.error = '';
                    this.$nextTick(() => lucide.createIcons());
                },

                async unlockActiveVault() {
                    const encrypted = localStorage.getItem(`data_${this.activeVaultId}`);
                    if (!encrypted) {
                        this.vault = [];
                        this.screen = 'app';
                        return;
                    }
                    try {
                        const decrypted = await this.decrypt(encrypted, this.masterKey);
                        this.vault = JSON.parse(decrypted).map(e => ({ ...e, visible: false }));
                        this.screen = 'app';
                        this.error = '';
                    } catch (e) {
                        this.error = "Authority Denied: Invalid Key";
                    }
                    this.$nextTick(() => lucide.createIcons());
                },

                async lockVault() {
                    await this.saveVaultData();
                    this.screen = 'selection';
                    this.masterKey = '';
                    this.vault = [];
                    this.activeVaultId = null;
                    this.$nextTick(() => lucide.createIcons());
                },

                async addEntry() {
                    if (!this.newEntry.site || !this.newEntry.pass) return;
                    this.vault.unshift({ ...this.newEntry, visible: false });
                    this.newEntry = { site: '', user: '', pass: '' };
                    await this.saveVaultData();
                    this.showToast("Stored");
                    this.$nextTick(() => lucide.createIcons());
                },

                async deleteEntry(index) {
                    this.vault.splice(index, 1);
                    await this.saveVaultData();
                },

                async saveVaultData() {
                    if (this.activeVaultId) {
                        try {
                            const enc = await this.encrypt(JSON.stringify(this.vault), this.masterKey);
                            localStorage.setItem(`data_${this.activeVaultId}`, enc);
                            if (!this.registry[this.activeVaultId]) {
                                this.registry[this.activeVaultId] = { name: "Recovered", created: new Date().toISOString(), itemCount: 0 };
                            }
                            this.registry[this.activeVaultId].itemCount = this.vault.length;
                            this.saveRegistry();
                        } catch (e) { console.error("Persistence error", e); }
                    }
                },

                saveRegistry() { localStorage.setItem('vault_registry', JSON.stringify(this.registry)); },

                async exportVault() {
                    if (!this.activeVaultId || !this.registry[this.activeVaultId]) return;
                    const data = await this.encrypt(JSON.stringify(this.vault), this.masterKey);
                    const pkg = { name: this.registry[this.activeVaultId].name, data: data };
                    const blob = new Blob([JSON.stringify(pkg)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${this.registry[this.activeVaultId].name}.monolith.json`;
                    a.click();
                },

                triggerImport() { document.getElementById('importFile').click(); },

                handleImport(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const pkg = JSON.parse(e.target.result);
                            const id = 'v_' + Date.now();
                            this.registry[id] = { name: pkg.name || 'Imported Monolith', created: new Date().toISOString(), itemCount: 0 };
                            localStorage.setItem(`data_${id}`, pkg.data);
                            this.saveRegistry();
                            this.showToast("Vault Integrated");
                        } catch(err) { console.error("Integration error", err); }
                    };
                    reader.readAsText(file);
                },

                generatePass() {
                    const c = "abcdefghjkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%&*";
                    let p = "";
                    for (let i = 0; i < 16; i++) p += c.charAt(Math.floor(Math.random() * c.length));
                    this.newEntry.pass = p;
                },

                copyToClipboard(text) {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    this.showToast("Copied to Clipboard");
                },

                showToast(m) {
                    this.toast.message = m;
                    this.toast.show = true;
                    setTimeout(() => this.toast.show = false, 3000);
                },

                async encrypt(text, key) {
                    const enc = new TextEncoder();
                    const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(key), "PBKDF2", false, ["deriveKey"]);
                    const cryptoKey = await crypto.subtle.deriveKey(
                        { name: "PBKDF2", salt: enc.encode('vault_v2'), iterations: 100000, hash: "SHA-256" },
                        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
                    );
                    const iv = crypto.getRandomValues(new Uint8Array(12));
                    const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, cryptoKey, enc.encode(text));
                    const combined = new Uint8Array(iv.length + ciphertext.byteLength);
                    combined.set(iv); combined.set(new Uint8Array(ciphertext), iv.length);
                    return btoa(String.fromCharCode(...combined));
                },

                async decrypt(base64, key) {
                    const enc = new TextEncoder();
                    const combined = new Uint8Array(atob(base64).split("").map(c => c.charCodeAt(0)));
                    const iv = combined.slice(0, 12);
                    const ciphertext = combined.slice(12);
                    const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(key), "PBKDF2", false, ["deriveKey"]);
                    const cryptoKey = await crypto.subtle.deriveKey(
                        { name: "PBKDF2", salt: enc.encode('vault_v2'), iterations: 100000, hash: "SHA-256" },
                        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
                    );
                    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, cryptoKey, ciphertext);
                    return new TextDecoder().decode(decrypted);
                }
            }
        }
    </script>
</body>
</html>
