<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault</title>
    <meta name="description" content="A secure password manager for your digital life">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="vaultApp()" x-init="init()">

    <!-- Theme Toggle -->
    <button @click="toggleTheme()" class="theme-toggle" :data-theme="theme">
        <svg class="sun-icon w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <!-- 1. VAULT SELECTION (THE GALLERY) -->
    <template x-if="screen === 'selection'">
        <div class="min-h-screen p-8 md:p-20 flex flex-col justify-center">
            <div class="max-w-7xl mx-auto w-full">
                <header class="mb-20">
                    <p class="text-xs font-bold uppercase tracking-[0.4em] text-secondary mb-6">Null-Vault.</p>
                    <h1 class="editorial-heading mb-8">Secure.<br>Minimal.<br>Personal.</h1>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <template x-for="(v, id) in registry" :key="id">
                        <div class="vault-card-elevated p-10 text-left group relative cursor-pointer" @click="selectVault(id)" @click.stop>
                            <div class="flex justify-between items-start mb-12">
                                <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: var(--surface-container-low)">
                                    <i data-lucide="shield-check" class="w-7 h-7" style="color: var(--primary)"></i>
                                </div>
                                <span class="text-[10px] font-semibold tracking-widest uppercase" style="color: var(--text-secondary); opacity: 0.7" x-text="new Date(v.created).getFullYear()"></span>
                            </div>
                            <h3 class="text-[3.5rem] leading-[1.1] mb-2 ml-10 mt-8 group-hover:opacity-80 transition-opacity" x-text="v.name" :style="{ color: 'var(--on-surface)', fontFamily: 'Manrope, sans-serif' }"></h3>
                            <p class="text-sm font-medium uppercase tracking-widest ml-10" style="color: var(--on-surface); opacity: 0.5" x-text="(v.itemCount || 0) + ' items'"></p>
                            <button @click="deleteVault(id)" class="absolute bottom-8 right-8 p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all hover:bg-surface-container-high z-10">
                                <i data-lucide="trash-2" class="w-5 h-5" style="color: var(--on-surface); opacity: 0.5"></i>
                            </button>
                        </div>
                    </template>

                    <button @click="screen = 'create'" class="p-10 border-4 border-dashed border-subtle rounded-[2rem] hover:border-primary/30 transition-all flex flex-col items-center justify-center gap-4 group">
                        <div class="w-16 h-16 rounded-full surface-container flex items-center justify-center group-hover:bg-primary-container transition-colors">
                            <i data-lucide="plus" class="w-8 h-8 text-secondary group-hover:text-primary"></i>
                        </div>
                        <span class="font-bold text-secondary group-hover:text-primary">New Vault</span>
                    </button>
                </div>

                <div class="mt-20 flex items-center gap-12 opacity-50 grayscale hover:grayscale-0 transition-all">
                    <button @click="triggerImport()" class="text-xs font-bold uppercase tracking-widest flex items-center gap-3 text-secondary">
                        <i data-lucide="file-up" class="w-4 h-4"></i> Link External Vault
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- 2. VAULT CREATION -->
    <template x-if="screen === 'create'">
        <div class="min-h-screen flex items-center p-8 md:p-20">
            <div class="max-w-xl w-full">
                <button @click="screen = 'selection'" class="mb-12 text-secondary hover:text-primary flex items-center gap-2 font-bold uppercase text-[10px] tracking-widest">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Return to Gallery
                </button>
                <h2 class="editorial-heading mb-12">Create<br>New Vault.</h2>
                <div class="space-y-6">
                    <input type="text" x-model="setup.name" placeholder="Vault Name" autocomplete="off" autocapitalize="off" class="input-editorial text-xl">
                    <input type="password" x-model="setup.key1" placeholder="Master Password" inputmode="text" autocomplete="new-password" class="input-editorial text-xl">
                    <input type="password" x-model="setup.key2" placeholder="Confirm Password" inputmode="text" autocomplete="new-password" class="input-editorial text-xl">
                    <div class="pt-6">
                        <button @click="createNewVault()" class="btn-primary w-full text-lg py-5">Initialize Vault</button>
                    </div>
                    <p x-show="error" x-text="error" class="text-rose-500 font-bold text-center" x-cloak></p>
                </div>
            </div>
        </div>
    </template>

    <!-- 3. UNLOCK -->
    <template x-if="screen === 'unlock'">
        <div class="min-h-screen flex items-center justify-center p-8">
            <div class="max-w-md w-full text-center">
                <div class="mb-12 inline-block p-8 rounded-full bg-primary/5">
                    <i data-lucide="lock" class="w-12 h-12" style="color: var(--primary)"></i>
                </div>
                <h2 class="text-4xl font-extrabold mb-4" x-text="activeVaultId ? registry[activeVaultId]?.name : ''"></h2>
                <p class="text-secondary mb-12">Enter your password to unlock this vault.</p>
                <div class="space-y-4">
                    <input type="password" x-model="masterKey" @keydown.enter="unlockActiveVault()" placeholder="Password" inputmode="text" autocomplete="current-password" class="input-editorial text-center text-2xl tracking-tight">
                    <div class="flex flex-col gap-4 pt-4">
                        <button @click="unlockActiveVault()" class="btn-primary text-lg">Unlock</button>
                        <button @click="screen = 'selection'; masterKey = ''" class="btn-ghost border-none text-secondary">Cancel</button>
                    </div>
                    <p x-show="error" x-text="error" class="text-rose-500 font-bold" x-cloak></p>
                </div>
            </div>
        </div>
    </template>

    <!-- 4. CORE APP -->
    <div x-show="screen === 'app'" class="min-h-screen p-8 md:p-20" x-cloak>
        <div class="max-w-7xl mx-auto">
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-12 mb-24">
                <div>
                    <button @click="lockVault()" class="mb-8 text-secondary hover:text-primary flex items-center gap-2 font-bold uppercase text-[10px] tracking-widest">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i> Exit Vault
                    </button>
                    <h1 class="editorial-heading" x-text="activeVaultId ? registry[activeVaultId]?.name : ''"></h1>
                </div>
                <div class="flex gap-4">
                    <button @click="exportVault()" class="btn-ghost"><i data-lucide="download" class="w-4 h-4 inline mr-2"></i> Export</button>
                    <button @click="lockVault()" class="btn-primary" style="background: var(--tertiary)">Seal Vault</button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <!-- Entry Side -->
                <div class="lg:col-span-4">
                    <div class="vault-card p-10 sticky top-20">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-secondary mb-8">Deposit Credential</h3>
                        <div class="space-y-4">
                            <input x-model="newEntry.site" type="text" placeholder="Platform" autocomplete="off" autocapitalize="off" class="input-editorial">
                            <input x-model="newEntry.user" type="text" placeholder="Identity" autocomplete="off" autocapitalize="off" class="input-editorial">
                            <div class="relative">
                                <input x-model="newEntry.pass" type="text" inputmode="text" placeholder="Secret" autocomplete="off" autocapitalize="off" class="input-editorial">
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
                                    <div x-show="showLengthPicker" x-cloak class="flex items-center gap-2 mr-2 p-2 rounded-lg" style="background: var(--surface-container); border: 1px solid var(--border-subtle)">
                                        <span class="text-xs font-medium" style="color: var(--text-secondary)" x-text="passLength"></span>
                                        <input type="range" x-model="passLength" min="8" max="32" step="1" class="w-20 cursor-pointer" style="accent-color: var(--primary)">
                                    </div>
                                    <button @click="generatePass()" style="color: var(--primary)">
                                        <i data-lucide="dices" class="w-5 h-5"></i>
                                    </button>
                                    <button @click="showLengthPicker = !showLengthPicker" style="color: var(--primary)" class="p-1">
                                        <i data-lucide="settings-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                            <button @click="addEntry()" class="btn-primary w-full mt-4">Store Securely</button>
                        </div>
                    </div>
                </div>

                <!-- List Side -->
                <div class="lg:col-span-8">
                    <div class="mb-12 relative max-w-xl">
                        <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-secondary"></i>
                        <input x-model="searchQuery" type="text" placeholder="Search passwords..." inputmode="search" autocomplete="off" class="w-full bg-transparent text-2xl font-semibold border-b-2 border-subtle py-6 pl-16 focus:border-primary outline-none transition-all" style="color: var(--on-surface)">
                    </div>

                    <div class="space-y-2">
                        <template x-for="(entry, index) in filteredVault" :key="index">
                            <div class="credential-row group flex items-center justify-between">
                                <div class="flex items-center gap-8">
                                    <div class="w-14 h-14 rounded-2xl bg-surface-container-lowest flex items-center justify-center" style="color: var(--primary)">
                                        <i data-lucide="shield" class="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <p class="text-2xl font-bold tracking-tight" x-text="entry.site"></p>
                                        <p class="text-sm font-medium text-secondary" x-text="entry.user"></p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-6">
                                    <div x-show="entry.visible" 
                                         @click="copyToClipboard(entry.pass)"
                                         class="bg-primary/5 px-6 py-3 rounded-full font-mono font-bold cursor-pointer hover:bg-primary/10 transition-colors group/pass relative"
                                         style="color: var(--primary)"
                                         title="Click to copy">
                                        <span x-text="entry.pass"></span>
                                        <i data-lucide="copy" class="w-3 h-3 ml-2 inline opacity-40 group-hover/pass:opacity-100 transition-opacity"></i>
                                    </div>
                                    <div class="flex opacity-0 group-hover:opacity-100 transition-opacity gap-2">
                                        <button @click="entry.visible = !entry.visible" class="p-3 hover:bg-surface-container-lowest rounded-full transition-colors text-secondary hover:text-primary">
                                            <i :data-lucide="entry.visible ? 'eye-off' : 'eye'" class="w-5 h-5"></i>
                                        </button>
                                        <button @click="deleteEntry(index)" class="p-3 hover:bg-rose-50 rounded-full transition-colors text-secondary hover:text-rose-500">
                                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- UI ELEMENTS -->
    <input type="file" id="importFile" @change="handleImport($event)" class="hidden" accept=".json">
    <div x-show="toast.show" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-8"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-250"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-8"
         class="toast fixed bottom-12 right-12 px-6 py-4 rounded-full shadow-2xl z-[100] flex items-center gap-4 font-bold">
        <i data-lucide="check-circle-2" class="w-5 h-5" style="color: var(--primary)"></i>
        <span x-text="toast.message"></span>
        <button x-show="toast.showUndo" @click="undoDelete()" class="ml-2 px-5 py-2 rounded-full font-semibold text-sm transition-all hover:opacity-80" style="background: var(--primary); color: white;">
            Undo
        </button>
    </div>

    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="script.js"></script>
</body>
</html>
